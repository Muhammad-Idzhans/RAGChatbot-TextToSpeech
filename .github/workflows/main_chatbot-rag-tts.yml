# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - chatbot-rag-tts

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present
          
          # Flatten the structure so server.js and .next are at the root
          if [ -d ".next/standalone/ragchatbot-tts" ]; then
            echo "Nesting detected. Flattening structure..."
            cp -ra .next/standalone/ragchatbot-tts/. .next/standalone/
            rm -rf .next/standalone/ragchatbot-tts
          fi
          
          # Copy static files to standalone directory (required for Standalone mode)
          mkdir -p .next/standalone/.next/static
          mkdir -p .next/standalone/public
          cp -ra public/. .next/standalone/public/ || true
          cp -ra .next/static/. .next/standalone/.next/static/ || true
          
          # Debug: Verify the structure
          echo "Final artifact structure check (Flattened):"
          ls -la .next/standalone
        working-directory: ./ragchatbot-tts

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./ragchatbot-tts/.next/standalone
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./deploy-package
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FAEEAE45488D4A9FB4913CD359675255 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A755A376F22B49189E74210DF7048ADB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F086B6171791476AAABD4C3EB37FBB43 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'chatbot-rag-tts'
          slot-name: 'Production'
          package: ./deploy-package
          